0A%20metal%20grating%20and%20a%20steam%20vent%20out%20of%20focus,%20occupying%20the%20bottom%2010%25.%20M:%20The%20cyborg%20leaning%20against%20the%20wall,%20fully%20in%20focus.%20B:%20A%20towering%20cityscape%20of%20neon-lit%20skyscrapers,%20heavily%20obscured%20by%20volumetric%20acid-rain%20fog,%20100%20meters%20behind%20the%20cyborg.%5C%22,%5C%22physics_gravity%5C%22:%5C%22The%20cyborg's%20weight%20is%20distributed%2060%25%20on%20the%20left%20boot%20and%2040%25%20on%20the%20right.%20The%20left%20boot%20has%20a%20visible%200.2-inch%20puddle%20of%20water%20rippling%20around%20its%20sole.%20The%20leaning%20shoulder%20creates%20visible%20compression%20against%20the%20corrugated%20steel.%5C%22,%5C%22lighting_shadow_logic%5C%22:%5C%22A%20single%20harsh%20magenta%20neon%20sign%20(#FF00FF)%20mounted%2015%20feet%20above%20casts%20harsh%20downward%20light.%20The%20cyborg's%20head%20casts%20a%20sharp,%20tall%20shadow%206%20feet%20behind%20him%20onto%20the%20alley%20floor.%20The%20pistol%20casts%20a%20distinct%20secondary%20shadow%20forward.%20Crucial:%20Two%20distinct,%20non-overlapping%20shadow%20sources%20exist.%5C%22,%5C%22color_texture_binding%5C%22:%5C%22The%20cyborg's%20trench%20coat%20is%20a%20glossy%20#1A1A1A%20pitch%20black.%20The%20cybernetic%20left%20arm%20is%20raw%20#C0C0C0%20silver%20chrome%20with%20exposed%20red%20#B22222%20wiring.%20The%20pistol%20is%20matte%20#2F4F4F%20with%20a%20cyan%20#00FFFF%20ammo%20counter.%20Crucial:%20The%20magenta%20neon%20light%20ONLY%20highlights%20the%20right%20side%20of%20the%20coat;%20the%20cyan%20ammo%20counter%20stays%20strictly%20bounded%20to%20the%20pistol%20slide.%5C%22,%5C%22perspective_lens%5C%22:%5C%22Dutch%20angle%20(15-degree%20tilt),%20shoulder-level%20perspective.%20Shot%20on%20a%2035mm%20anamorphic%20lens.%20Mid-shot,%20cropping%20at%20the%20cyborg's%20knees%20and%20just%20above%20his%20head.%5C%22,%5C%22style_render%5C%22:%5C%22Photorealistic%208k,%20Octane%20Render,%20ray-traced%20reflections,%20volumetric%20fog,% ial:%20The%20red%20of%20the%20dress%20MUST%20NOT%20reflect%20onto%20the%20ivory%20skin;%20the%20skin%20remains%20strictly%20cool-toned%20to%20separate%20it%20from%20the%20fabric.%5C%22,%5C%22perspective_lens%5C%22:%5C%22Eye-level%20perspective,%2050mm%20prime%20lens.%20Three-quarter%20bust/waist%20shot,%20cropping%20at%20the%20noblewoman's%20knees%20and%20just%20above%20the%20top%20of%20her%20head.%5C%22,%5C%22style_render%5C%22:%5C%22Oil%20on%20linen%20canvas,%20smooth%20sfumato%20blending,%20thick%20impasto%20on%20the%20dress%20details,%20aged%20varnish%20patina,%208k.%5C%22,%5C%22hard_stops%5C%22:%5C%22No%20modern%20clothing,%20no%20direct%20eye%20contact%20with%20camera%20(gaze%20is%20averted),%20no%20harsh%20LED%20lighting,%20no%20abstract%20geometry,%20no%20extra%20hands%20(exactly%202%20visible).%5C%22,%5C%22count_verification%5C%22:%5C%22Exactly%201%20noblewoman,%20exactly%202%20visible%20hands,%20exactly%202%20visible%20feet,%20exactly%201%20chair,%20exactly%201%20fan,%20exactly%200%20background%20figures.%5C%22%7D,%5Cn%20%20%5C%22Abstract%20Painting%20Generator%5C%22:%20%7B%5C%22primary_subject_grounding%5C%22:%5C%22No%20human%20figures,%20animals,%20or%20recognizable%20objects.%20The%20canvas%20is%20entirely%20occupied%20by%20geometric%20and%20organic%202D%20shapes.%20No%20single%20subject%20exists%20to%20ground;%20the%20entire%20flat%20canvas%20is%20the%20subject.%5C%22,%5C%22secondary_figures%5C%22:%5C%22Not%20applicable.%20This%20is%20a%20non-figurative%202D%20plane.%5C%22,%5C%22depth_layers%5C%22:%5C%22Strictly%202D%20flat%20plane.%20No%20foreground,%20midground,%20or%20background%20depth.%20All%20elements%20exist%20on%20the%20same%20singular,%20flat%20Cartesian%20plane.%20Zero%20perspective%20distortion.%5C%22,%5C%22physics_gravity%5C%22:%5C%22No%20gravity%20applies.%20Shapes%20are%20freely%20floating%20in%20the%202D%20space,%20not%20anchored%20to%20any%20surface.%5C%22,%5C%22lighting_shadow_logic%5C%22:%5C%22Completely%20flat,%20even,%20museum-grade 0the%20bottom%2030%25%20of%20the%20frame.%20M:%20The%20central%20cluster%20of%20blooming%20water%20lilies,%20painted%20with%20broken%20brushstrokes.%20B:%20A%20treeline%20of%20tall%20poplar%20trees%20and%20a%20hazy%20sky,%20heavily%20diffused%20and%20merged%20with%20the%20water%20at%20the%20horizon%20line.%5C%22,%5C%22physics_gravity%5C%22:%5C%22The%20lilies%20float%20without%20sinking;%20their%20weight%20is%20displaced%20by%20the%20water.%20The%20wooden%20boat%20rocks%20gently,%20causing%20tiny%20ripple%20lines%20in%20the%20water's%20surface.%5C%22,%5C%22lighting_shadow_logic%5C%22:%5C%22Soft,%20dappled%20natural%20daylight%20filtering%20through%20the%20poplar%20leaves.%20The%20shadows%20are%20not%20black;%20they%20are%20painted%20in%20complementary%20purple%20and%20blue%20tones.%20No%20harsh%20cast%20shadows%20exist.%5C%22,%5C%22color_texture_binding%5C%22:%5C%22The%20water%20is%20a%20shimmering%20mix%20of%20cerulean%20blue%20#007BA7%20and%20lavender%20#E6E6FA.%20The%20lilies%20are%20soft%20pink%20#FFB6C1%20with%20yellow%20#FFD700%20centers.%20The%20trees%20are%20a%20mix%20of%20moss%20green%20#8A9A5B.%20Crucial:%20The%20pink%20of%20the%20lilies%20is%20broken%20into%20separate%20brushstrokes%20of%20red%20and%20white,%20NOT%20blended%20into%20a%20solid%20color.%20The%20water%20reflections%20strictly%20mirror%20the%20sky's%20broken%20colors.%5C%22,%5C%22perspective_lens%5C%22:%5C%22Slightly%20low-angle%20perspective%20at%20water-level.%20Shot%20on%20an%2085mm%20lens%20with%20soft%20focus.%20Horizon%20line%20is%20placed%20high,%20occupying%20the%20top%2020%25%20of%20the%20frame.%5C%22,%5C%22style_render%5C%22:%5C%22Thick,%20broken%20brushstrokes,%20wet-on-wet%20painting,%20visible%20unblended%20adjacent%20complementary%20colors,%20canvas%20texture%20visible.%5C%22,%5C%22hard_stops%5C%22:%5C%22No%20hard%20outlines,%20no%20pure%20black%20paint%20(use%20darks/blues),%20no%20photorealism,%20no%20crisp%20edges,%20no%20solid%20flat%20color%20areas.%5C%22,%5C%22count_verific 0el('canvas');%5Cn%20%20%20%20%20%20%20%20mask.width%20=%20baseCanvas.width;%5Cn%20%20%20%20%20%20%20%20mask.height%20=%20baseCanvas.height;%5Cn%20%20%20%20%20%20%20%20var%20mctx%20=%20mask.getContext('2d');%5Cn%20%20%20%20%20%20%20%20var%20f%20=%20Math.max(0,%20feather);%5Cn%20%20%20%20%20%20%20%20if%20(f%20===%200)%20%7B%5Cn%20%20%20%20%20%20%20%20%20%20mctx.fillStyle%20=%20'#fff';%5Cn%20%20%20%20%20%20%20%20%20%20mctx.fillRect(rx,%20ry,%20rw,%20rh);%5Cn%20%20%20%20%20%20%20%20%7D%20else%20%7B%5Cn%20%20%20%20%20%20%20%20%20%20//%20Radial-ish%20feather%20via%20nested%20rounded%20rects%5Cn%20%20%20%20%20%20%20%20%20%20mctx.fillStyle%20=%20'#fff';%5Cn%20%20%20%20%20%20%20%20%20%20mctx.fillRect(rx%20+%20f,%20ry%20+%20f,%20rw%20-%202*f,%20rh%20-%202*f);%5Cn%20%20%20%20%20%20%20%20%20%20//%20Edges%20with%20gradients%5Cn%20%20%20%20%20%20%20%20%20%20function%20edgeGrad(x0,y0,x1,y1,rectFn)%7B%5Cn%20%20%20%20%20%20%20%20%20%20%20%20var%20g%20=%20mctx.createLinearGradient(x0,y0,x1,y1);%5Cn%20%20%20%20%20%20%20%20%20%20%20%20g.addColorStop(0,%20'rgba(255,255,255,0)');%5Cn%20%20%20%20%20%20%20%20%20%20%20%20g.addColorStop(1,%20'rgba(255,255,255,1)');%5Cn%20%20%20%20%20%20%20%20%20%20%20%20mctx.fillStyle%20=%20g;%5Cn%20%20%20%20%20%20%20%20%20%20%20%20rectFn();%5Cn%20%20%20%20%20%20%20%20%20%20%7D%5Cn%20%20%20%20%20%20%20%20%20%20edgeGrad(rx,0,rx+f,0,%20function()%7B%20mctx.fillRect(rx,%20ry+f,%20f,%20rh-2*f);%20%7D);%5Cn%20%20%20%20%20%20%20%20%20%20edgeGrad(rx+rw-f,0,rx+rw,0,%20function()%7B%20mctx.fillRect(rx+rw-f,%20ry+f,%20f,%20rh-2*f);%20%7D);%5Cn%20%20%20%20%20%20%20%20%20%20edgeGrad(0,ry,0,ry+f,%20function()%7B%20mctx.fillRect(rx+f,%20ry,%20rw-2*f,%20f);%20%7D);%5Cn%20%20%20%20%20%20%20%20%20%20edgeGrad(0,ry+rh-f,0,ry+rh,%20function()%7B%20mctx.fillRect(rx+f,%20ry+rh-f,%20rw-2*f,%20f);%20%7D);%5Cn%20%20%20%20%20%20%20%20%20%20//%20Corners%20(solid%20white%20square,%20edges%20already%20feathered%20in)%5Cn%20%20%20%20%20%20%20%20%20%20mctx.fillStyle%20=%20'#fff';%5Cn%20%20%20%20%20%20%20%20%20%20mctx.fillRect(rx+f,%20ry+f,%20Math.max(0,rw-2*f),%20Math.max(0,rh-2*f));%5Cn%20%20%20%20%20%20%20%20%7D%5Cn%20%20%20%20%20%20%20%20//%20Apply%20mask%20as%20destination-in%20on%20temp%5Cn%20%20%20%20%20%20%20%20tctx.globalCompositeOperation%20=%20'destination-in';%5Cn%20%20%20%20%20%20%20%20tctx.drawImage(mask,%200,%200);%5Cn%20%20%20%20%20%20%20%20tctx.globalCompositeOperation%20=%20'source-over';%5Cn%20%20%20%20%20%20%20%20//%20Draw%20feathered%20patch%20onto%20base%5Cn%20%20%20%20%20%20%20%20ctx.drawImage(temp,%200,%200);%5Cn%20%20%20%20%20%20%20%20resolve(baseCanvas.toDataURL('image/png'));%5Cn%20%20%20%20%20%20%7D%20catch%20(e)%20%7B%20reject(e);%20%7D%5Cn%20%20%20%20%7D;%5Cn%20%20%20%20patchImg.onerror%20=%20reject;%5Cn%20%20%20%20patchImg.src%20=%20patchDataUrl;%5Cn%20%20%7D);%5Cn%7D%5Cn%5Cn//%20Vision:%20analyze%20image%20+%20edit%20instruction,%20return%20region%20+%20patch%20prompt.%5Cn//%20Uses%20chain-of-thought%20reasoning%20to%20infer%20implicit%20subjects%20(e.g.%20%5C%22make%20me%5Cn//%20have%20wings%5C%22%20%E2%86%92%20%5C%22me%5C%22%20=%20main%20person,%20wings%20attach%20to%20upper%20back)%20and%20to%20decide%5Cn//%20whether%20the%20edit%20is%20an%20ADDITION%20(region%20must%20expand%20beyond%20the%20subject%20to%5Cn//%20fit%20the%20new%20element),%20a%20MODIFICATION%20(tight%20region%20around%20the%20object),%20a%5Cn//%20REMOVAL%20(object's%20bounds),%20or%20ATMOSPHERIC%20(whole%20image).%5Cnasync%20function%20analyzeEditRegion(dataUrl,%20editInstruction)%20%7B%5Cn%20%20var%20blob%20=%20await%20dataUrlToBlob(dataUrl);%5Cn%20%20var%20raw%20=%20await%20root.generateText(%7B%5Cn%20%20%20%20instruction:%20%5B%5Cn%20%20%20%20%20%20%5C%22You%20are%20an%20expert%20image%20editing%20assistant.%20The%20user%20wants%20to%20apply%20this%20edit:%20%5C%5C%5C%22%5C%22%20+%20editInstruction%20+%20%5C%22%5C%5C%5C%22.%5C%5Cn%5C%5Cn%5C%22%20+%5Cn%20%20%20%20%20%20%5C%22You%20MUST%20reason%20step%20by%20step%20BEFORE%20deciding%20the%20region.%20Think%20about:%5C%5Cn%5C%22%20+%5Cn%20%20%20%20%20%20%5C%221.%20PRONOUN%20RESOLUTION:%20if%20the%20user%20says%20%5C%5C%5C%22me%5C%5C%5C%22,%20%5C%5C%5C%22my%5C%5C%5C%22,%20%5C%5C%5C%22I%5C%5C%5C%22,%20%5C%5C%5C%22the%20person%5C%5C%5C%22,%20%5C%5C%5C%22the%20man/woman/child%5C%5C%5C%22%20etc.,%20identify%20WHO%20in%20the%20image%20they%20mean%20(usually%20the%20main%20subject).%20State%20their%20location%20in%20the%20frame.%5C%5Cn%5C%22%20+%5Cn%20%20%20%20%20%20%5C%222.%20ANATOMICAL/PHYSICAL%20PLACEMENT:%20if%20the%20edit%20adds%20or%20changes%20a%20body%20part,%20clothing,%20or%20accessory,%20reason%20about%20WHERE%20it%20attaches%20anatomically.%20Wings%20%E2%86%92%20upper%20back%20&%20sides.%20Hat%20%E2%86%92%20top%20of%20head.%20Sunglasses%20%E2%86%92%20eyes.%20Beard%20%E2%86%92%20lower%20face.%20Tail%20%E2%86%92%20lower%20back.%20Armor%20%E2%86%92%20torso.%20Jewelry%20%E2%86%92%20specific%20body%20part.%20The%20region%20must%20include%20that%20body%20part%20PLUS%20any%20space%20the%20new%20element%20will%20occupy%20(wings%20extend%20sideways%20beyond%20the%20body,%20so%20the%20region%20must%20include%20empty%20space%20beside%20the%20torso).%5C%5Cn%5C%22%20+%5Cn%20%20%20%20%20%20%5C%223.%20EDIT%20TYPE:%20classify%20as%20'add'%20(new%20element%20appears),%20'modify'%20(existing%20element%20changes%20color/style),%20'remove'%20(existing%20element%20disappears),%20or%20'atmospheric'%20(lighting,%20weather,%20time%20of%20day,%20mood%20%E2%80%94%20affects%20whole%20image).%5C%5Cn%5C%22%20+%5Cn%20%20%20%20%20%20%5C%224.%20REGION%20SIZE:%20for%20'add',%20the%20region%20is%20the%20subject's%20body%20part%20PLUS%20surrounding%20empty%20space%20where%20the%20new%20element%20will%20extend%20(expand%20outward).%20For%20'modify'/'remove',%20the%20region%20is%20the%20tight%20bounding%20box%20of%20just%20the%20target%20element.%20For%20'atmospheric',%20the%20region%20is%20the%20whole%20image.%5C%5Cn%5C%22%20+%5Cn%20%20%20%20%20%20%5C%225.%20PATCH%20PROMPT:%20a%20dense%2
